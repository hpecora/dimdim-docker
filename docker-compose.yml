services:
  db-556612:
    image: postgres:16
    container_name: db-556612
    environment:
      POSTGRES_DB: dimdim
      POSTGRES_USER: dimdim
      POSTGRES_PASSWORD: dimdim123
    volumes:
      - dimdim-556612-pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - dimdim-network

  app-556612:
    image: python:3.12-slim
    container_name: app-556612
    working_dir: /app
    volumes:
      - ./app:/app
    command: >
      bash -c "pip install -r requirements.txt &&
               python app.py"
    environment:
      DB_HOST: db-556612
      DB_PORT: 5432
      DB_NAME: dimdim
      DB_USER: dimdim
      DB_PASSWORD: dimdim123
      FLASK_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      - db-556612
    networks:
      - dimdim-network

volumes:
  dimdim-556612-pgdata:

networks:
  dimdim-network: